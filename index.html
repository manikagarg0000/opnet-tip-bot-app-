<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OP_NET Tip Bot App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Bitcoin Tip Bot (OP_NET Testnet)</h1>

  <section>
    <button onclick="sendTip()">💸 Send Tip</button>
    <button onclick="mintNFT()">🎨 Mint NFT</button>
    <button onclick="deployToken()">🚀 Deploy Token</button>
    <button onclick="buyToken()">🛒 Buy Token</button>
    <button onclick="sellToken()">📉 Sell Token</button>
    <button onclick="claimToken()">🎁 Claim Token</button>
  </section>

  <section id="musicPlayer">
    <h2>Background Music</h2>
    <button onclick="toggleMusic()">Play/Pause Music</button>
    <div class="music-box">
      <button class="music-btn">▶</button>
      <div class="eq">
        <div class="eq-b"></div>
        <div class="eq-b"></div>
        <div class="eq-b"></div>
        <div class="eq-b"></div>
      </div>
      <span class="track-name">Bitcoin Anthem</span>
    </div>
    <iframe id="ytplayer" width="0" height="0"
      src="https://www.youtube.com/embed/fyHkM0RJmiU?enablejsapi=1"
      frameborder="0"
      allow="autoplay; encrypted-media">
    </iframe>
  </section>

  <script src="script.js"></script>
</body>
</html>
